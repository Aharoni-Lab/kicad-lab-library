version: "1.0"
description: ".Lab: Shared KiCad Library for the Aharoni Lab"

library:
  prefix: ".Lab"
  description: "Validated KiCad library for lab-wide hardware"
  maintainer: "Daniel Aharoni <daharoni@mednet.ucla.edu>"
  license: "MIT"
  website: "https://github.com/Aharoni-Lab/kicad-lab-library"
  repository: "https://github.com/Aharoni-Lab/kicad-lab-library.git"
  directories:
    symbols: "symbols"
    footprints: "footprints"
    models_3d: "3dmodels"
    documentation: "docs"
    tables: "tables"
  naming:
    symbols:
      prefix: true
      separator: "_"
      case: "upper"
      include_categories: true
      category_separator: "_"
    footprints:
      prefix: true
      separator: "_"
      case: "upper"
      include_categories: true
      category_separator: "_"
    models_3d:
      prefix: false
      separator: "_"
      case: "lower"
      include_categories: false
      category_separator: "_"

symbols:
  passive:
    description: "Passive components"
    entries:
      resistor:
        description: "Resistor symbols"
        reference_prefix: "R"
        required_properties:
          Validated:
            type: "string"
            pattern: "^(Yes|No)$"
            description: "Whether the component has been validated"
        optional_properties:
          Value:
            type: "string"
            pattern: "^[0-9.]+[kM]?[Ω]?$"
            description: "Resistance with unit"
          Tolerance:
            type: "string"
            pattern: "^[0-9.]+%$"
            description: "Tolerance"
          Power:
            type: "string"
            pattern: "^[0-9.]+W$"
            description: "Power rating"
          Datasheet:
            type: "string"
            pattern: "^https?://.*$"
            description: "URL to datasheet"
        pins:
          min_count: 2
          max_count: 2

      capacitor:
        description: "Capacitor symbols"
        reference_prefix: "C"
        required_properties:
          Validated:
            type: "string"
            pattern: "^(Yes|No)$"
            description: "Whether the component has been validated"
        optional_properties:
          Value:
            type: "string"
            pattern: "^[0-9.]+[pPnNuUmMkK]?F$"
            description: "Capacitance value"
          Voltage:
            type: "string"
            pattern: "^[0-9.]+V$"
            description: "Voltage rating"
          Datasheet:
            type: "string"
            pattern: "^https?://.*$"
            description: "URL to datasheet"
        pins:
          min_count: 2
          max_count: 2

      inductor:
        description: "Inductor symbols"
        reference_prefix: "L"
        required_properties:
          Validated:
            type: "string"
            pattern: "^(Yes|No)$"
        optional_properties:
          Value:
            type: "string"
            pattern: "^[0-9.]+[uUnNmH]$"
            description: "Inductance value"
          Datasheet:
            type: "string"
            pattern: "^https?://.*$"
            description: "URL to datasheet"
        pins:
          min_count: 2
          max_count: 2

      ferrite_bead:
        description: "Ferrite bead symbols"
        reference_prefix: "L"
        required_properties:
          Validated:
            type: "string"
            pattern: "^(Yes|No)$"
        optional_properties:
          Impedance:
            type: "string"
            description: "Impedance value"
          Datasheet:
            type: "string"
            pattern: "^https?://.*$"
            description: "URL to datasheet"
        pins:
          min_count: 2
          max_count: 2

      diode:
        description: "Diode symbols"
        reference_prefix: "D"
        required_properties:
          Validated:
            type: "string"
            pattern: "^(Yes|No)$"
        optional_properties:
          Type:
            type: "string"
            description: "Diode type (e.g., signal, Schottky)"
          Datasheet:
            type: "string"
            pattern: "^https?://.*$"
        pins:
          min_count: 2
          max_count: 2

  active:
    description: "Active components"
    entries:
      opamp:
        description: "Op-amp symbols"
        reference_prefix: "U"
        required_properties:
          Validated:
            type: "string"
            pattern: "^(Yes|No)$"
        optional_properties:
          Datasheet:
            type: "string"
            pattern: "^https?://.*$"
        pins:
          min_count: 5

      comparator:
        description: "Comparator symbols"
        reference_prefix: "U"
        required_properties:
          Validated:
            type: "string"
            pattern: "^(Yes|No)$"
        optional_properties:
          Datasheet:
            type: "string"
            pattern: "^https?://.*$"
        pins:
          min_count: 4

      transistor:
        description: "Transistor symbols"
        reference_prefix: "Q"
        required_properties:
          Validated:
            type: "string"
            pattern: "^(Yes|No)$"
        optional_properties:
          Type:
            type: "string"
            description: "BJT or MOSFET"
          Datasheet:
            type: "string"
            pattern: "^https?://.*$"
        pins:
          min_count: 3

  power:
    description: "Power management"
    entries:
      regulator:
        description: "Regulator symbols"
        reference_prefix: "U"
        required_properties:
          Validated:
            type: "string"
            pattern: "^(Yes|No)$"
        optional_properties:
          Datasheet:
            type: "string"
            pattern: "^https?://.*$"
        pins:
          min_count: 3

      power_monitor:
        description: "Power monitor symbols"
        reference_prefix: "U"
        required_properties:
          Validated:
            type: "string"
            pattern: "^(Yes|No)$"
        optional_properties:
          Datasheet:
            type: "string"
            pattern: "^https?://.*$"
        pins:
          min_count: 3

      supervisor:
        description: "Power supervisor symbols"
        reference_prefix: "U"
        required_properties:
          Validated:
            type: "string"
            pattern: "^(Yes|No)$"
        optional_properties:
          Datasheet:
            type: "string"
            pattern: "^https?://.*$"
        pins:
          min_count: 3

  connector:
    description: "Connector symbols"
    entries:
      header:
        description: "Header symbols"
        reference_prefix: "J"
        required_properties:
          Validated:
            type: "string"
            pattern: "^(Yes|No)$"
        optional_properties:
          Datasheet:
            type: "string"
            pattern: "^https?://.*$"
        pins:
          min_count: 2

      usb:
        description: "USB symbols"
        reference_prefix: "J"
        required_properties:
          Validated:
            type: "string"
            pattern: "^(Yes|No)$"
        optional_properties:
          Datasheet:
            type: "string"
            pattern: "^https?://.*$"
        pins:
          min_count: 4

      molex:
        description: "Molex symbols"
        reference_prefix: "J"
        required_properties:
          Validated:
            type: "string"
            pattern: "^(Yes|No)$"
        optional_properties:
          Datasheet:
            type: "string"
            pattern: "^https?://.*$"
        pins:
          min_count: 2

      jst:
        description: "JST symbols"
        reference_prefix: "J"
        required_properties:
          Validated:
            type: "string"
            pattern: "^(Yes|No)$"
        optional_properties:
          Datasheet:
            type: "string"
            pattern: "^https?://.*$"
        pins:
          min_count: 2

  logic:
    description: "Logic symbols"
    entries:
      gate:
        description: "Logic gate symbols"
        reference_prefix: "U"
        required_properties:
          Validated:
            type: "string"
            pattern: "^(Yes|No)$"
        pins:
          min_count: 4

      flipflop:
        description: "Flip-flop symbols"
        reference_prefix: "U"
        required_properties:
          Validated:
            type: "string"
            pattern: "^(Yes|No)$"
        pins:
          min_count: 6

      multiplexer:
        description: "Multiplexer symbols"
        reference_prefix: "U"
        required_properties:
          Validated:
            type: "string"
            pattern: "^(Yes|No)$"
        pins:
          min_count: 4

      level_shifter:
        description: "Level-shifter symbols"
        reference_prefix: "U"
        required_properties:
          Validated:
            type: "string"
            pattern: "^(Yes|No)$"
        pins:
          min_count: 4

  memory:
    description: "Memory symbols"
    entries:
      eeprom:
        description: "EEPROM symbols"
        reference_prefix: "U"
        required_properties:
          Validated:
            type: "string"
            pattern: "^(Yes|No)$"
        pins:
          min_count: 8

      flash:
        description: "Flash symbols"
        reference_prefix: "U"
        required_properties:
          Validated:
            type: "string"
            pattern: "^(Yes|No)$"
        pins:
          min_count: 8

      ram:
        description: "RAM symbols"
        reference_prefix: "U"
        required_properties:
          Validated:
            type: "string"
            pattern: "^(Yes|No)$"
        pins:
          min_count: 8

  mcu:
    description: "Microcontroller symbols"
    entries:
      microchip:
        description: "Microchip PIC/AVR symbols"
        reference_prefix: "U"
        required_properties:
          Validated:
            type: "string"
            pattern: "^(Yes|No)$"
        pins:
          min_count: 20

      st:
        description: "ST STM32 symbols"
        reference_prefix: "U"
        required_properties:
          Validated:
            type: "string"
            pattern: "^(Yes|No)$"
        pins:
          min_count: 32

      espressif:
        description: "Espressif ESP32 symbols"
        reference_prefix: "U"
        required_properties:
          Validated:
            type: "string"
            pattern: "^(Yes|No)$"
        pins:
          min_count: 38

  sensor:
    description: "Sensor symbols"
    entries:
      temperature:
        description: "Temperature sensor symbols"
        reference_prefix: "U"
        required_properties:
          Validated:
            type: "string"
            pattern: "^(Yes|No)$"
        pins:
          min_count: 3

      pressure:
        description: "Pressure sensor symbols"
        reference_prefix: "U"
        required_properties:
          Validated:
            type: "string"
            pattern: "^(Yes|No)$"
        pins:
          min_count: 3

      accelerometer:
        description: "Accelerometer symbols"
        reference_prefix: "U"
        required_properties:
          Validated:
            type: "string"
            pattern: "^(Yes|No)$"
        pins:
          min_count: 6

      gyro:
        description: "Gyro symbols"
        reference_prefix: "U"
        required_properties:
          Validated:
            type: "string"
            pattern: "^(Yes|No)$"
        pins:
          min_count: 6

footprints:
  passive:
    description: "Passive footprints"
    entries:
      resistor_smd:
        description: "SMD resistor footprint"
        reference_prefix: "REF"
        required_properties:
          Validated:
            type: "string"
            pattern: "^(Yes|No)$"
        pads:
          count: 2
          naming:
            pattern: "^[12]$"

      capacitor_smd:
        description: "SMD capacitor footprint"
        reference_prefix: "REF"
        required_properties:
          Validated:
            type: "string"
            pattern: "^(Yes|No)$"
        pads:
          count: 2
          naming:
            pattern: "^[12]$"

      inductor_smd:
        description: "SMD inductor footprint"
        reference_prefix: "REF"
        required_properties:
          Validated:
            type: "string"
            pattern: "^(Yes|No)$"
        pads:
          count: 2
          naming:
            pattern: "^[12]$"

      ferrite_bead_smd:
        description: "SMD ferrite bead footprint"
        reference_prefix: "REF"
        required_properties:
          Validated:
            type: "string"
            pattern: "^(Yes|No)$"
        pads:
          count: 2
          naming:
            pattern: "^[12]$"

      diode_smd:
        description: "SMD diode footprint"
        reference_prefix: "REF"
        required_properties:
          Validated:
            type: "string"
            pattern: "^(Yes|No)$"
        pads:
          count: 2
          naming:
            pattern: "^[12]$"

  ic:
    description: "IC footprints"
    entries:
      soic:
        description: "SOIC footprint"
        reference_prefix: "REF"
        required_properties:
          Validated:
            type: "string"

models_3d:
  passive:
    description: "Passive component 3D models"
    entries:
      capacitor_smd:
        description: "SMD capacitor 3D models"
        naming:
          pattern: "^C_[0-9]{4}_[0-9]{4}Metric$"
          description_pattern: "^3D model for [0-9]{4} metric SMD capacitor$"
      resistor_smd:
        description: "SMD resistor 3D models"
        naming:
          pattern: "^R_[0-9]{4}_[0-9]{4}Metric$"
          description_pattern: "^3D model for [0-9]{4} metric SMD resistor$"
      inductor_smd:
        description: "SMD inductor 3D models"
        naming:
          pattern: "^L_[0-9]{4}_[0-9]{4}Metric$"
          description_pattern: "^3D model for [0-9]{4} metric SMD inductor$"
      diode_smd:
        description: "SMD diode 3D models"
        naming:
          pattern: "^D_[0-9]{4}_[0-9]{4}Metric$"
          description_pattern: "^3D model for [0-9]{4} metric SMD diode$"

  ic:
    description: "IC package 3D models"
    entries:
      soic:
        description: "SOIC package 3D models"
        naming:
          pattern: "^SOIC-[0-9]+_[0-9]+x[0-9]+mm_P[0-9]+mm$"
          description_pattern: "^3D model for SOIC-[0-9]+ package$"
      qfn:
        description: "QFN package 3D models"
        naming:
          pattern: "^QFN-[0-9]+_[0-9]+x[0-9]+mm_P[0-9]+mm$"
          description_pattern: "^3D model for QFN-[0-9]+ package$"
      qfp:
        description: "QFP package 3D models"
        naming:
          pattern: "^QFP-[0-9]+_[0-9]+x[0-9]+mm_P[0-9]+mm$"
          description_pattern: "^3D model for QFP-[0-9]+ package$"

documentation:
  passive:
    description: "Passive component datasheets"
    entries:
      resistor:
        description: "Resistor datasheets"
        naming:
          pattern: "^[A-Z0-9-]+_datasheet\\.pdf$"
      capacitor:
        description: "Capacitor datasheets"
        naming:
          pattern: "^[A-Z0-9-]+_datasheet\\.pdf$"
      inductor:
        description: "Inductor datasheets"
        naming:
          pattern: "^[A-Z0-9-]+_datasheet\\.pdf$"
      diode:
        description: "Diode datasheets"
        naming:
          pattern: "^[A-Z0-9-]+_datasheet\\.pdf$"

  active:
    description: "Active component datasheets"
    entries:
      opamp:
        description: "Op-amp datasheets"
        naming:
          pattern: "^[A-Z0-9-]+_datasheet\\.pdf$"
      comparator:
        description: "Comparator datasheets"
        naming:
          pattern: "^[A-Z0-9-]+_datasheet\\.pdf$"
      transistor:
        description: "Transistor datasheets"
        naming:
          pattern: "^[A-Z0-9-]+_datasheet\\.pdf$"

  power:
    description: "Power management datasheets"
    entries:
      regulator:
        description: "Regulator datasheets"
        naming:
          pattern: "^[A-Z0-9-]+_datasheet\\.pdf$"
      power_monitor:
        description: "Power monitor datasheets"
        naming:
          pattern: "^[A-Z0-9-]+_datasheet\\.pdf$"

  memory:
    description: "Memory component datasheets"
    entries:
      eeprom:
        description: "EEPROM datasheets"
        naming:
          pattern: "^[A-Z0-9-]+_datasheet\\.pdf$"
      flash:
        description: "Flash memory datasheets"
        naming:
          pattern: "^[A-Z0-9-]+_datasheet\\.pdf$"
      ram:
        description: "RAM datasheets"
        naming:
          pattern: "^[A-Z0-9-]+_datasheet\\.pdf$"

  mcu:
    description: "Microcontroller datasheets"
    entries:
      microchip:
        description: "Microchip PIC/AVR datasheets"
        naming:
          pattern: "^[A-Z0-9-]+_datasheet\\.pdf$"
      st:
        description: "ST STM32 datasheets"
        naming:
          pattern: "^[A-Z0-9-]+_datasheet\\.pdf$"
      espressif:
        description: "Espressif ESP32 datasheets"
        naming:
          pattern: "^[A-Z0-9-]+_datasheet\\.pdf$"
