# KiCad Lab Library Structure Configuration
# This file defines the allowed categories, subcategories, and their naming conventions

categories:
  passive:
    description: "Passive components"
    subcategories:
      resistors:
        description: "Resistors"
        reference_prefixes: ["R"]
      capacitors:
        description: "Capacitors"
        reference_prefixes: ["C"]
      inductors:
        description: "Inductors"
        reference_prefixes: ["L"]

  active:
    description: "Active components"
    subcategories:
      sensors:
        description: "Sensors and transducers"
        subcategories:
          cmos_image:
            description: "CMOS image sensors"
            reference_prefixes: ["U_CMOS"]
          environmental:
            description: "Environmental sensors"
            reference_prefixes: ["U_ENV"]
      ics:
        description: "Integrated circuits"
        subcategories:
          microcontrollers:
            description: "Microcontrollers and processors"
            reference_prefixes: ["U_MCU"]
          memory:
            description: "Memory ICs"
            reference_prefixes: ["U_MEM"]
          interface:
            description: "Interface ICs"
            reference_prefixes: ["U_IF"]
      discrete:
        description: "Discrete semiconductor components"
        subcategories:
          transistors:
            description: "Transistors"
            reference_prefixes: ["Q"]
          diodes:
            description: "Diodes"
            reference_prefixes: ["D"]

  connectors:
    description: "Connectors and interfaces"
    subcategories:
      board:
        description: "Board-to-board connectors"
        reference_prefixes: ["J_BOARD"]
      wire:
        description: "Wire-to-board connectors"
        reference_prefixes: ["J_WIRE"]
      rf:
        description: "RF connectors"
        reference_prefixes: ["J_RF"]

  mechanical:
    description: "Mechanical components"
    subcategories:
      mounting:
        description: "Mounting hardware"
        reference_prefixes: ["H", "M"]
      enclosure:
        description: "Enclosure parts"
        reference_prefixes: ["E"]

  power:
    description: "Power components"
    subcategories:
      regulators:
        description: "Voltage regulators"
        reference_prefixes: ["U_REG"]
      converters:
        description: "DC-DC converters"
        reference_prefixes: ["U_CONV"]
      protection:
        description: "Protection circuits"
        reference_prefixes: ["U_PROT"]

  misc:
    description: "Miscellaneous components"
    subcategories:
      misc:
        description: "Other components"
        reference_prefixes: []

# Validation rules
validation:
  required_symbol_fields:
    - "Value"
    - "Footprint"
    - "Datasheet"
    - "Description"
    - "Keywords"
    - "Validated"
  
  required_footprint_fields:
    - "Value"
    - "Datasheet"
    - "Description"
    - "Keywords"
    - "Validated"
  
  max_3d_model_size_mb: 10  # Maximum size for 3D model files in megabytes

# Datasheet storage configuration
datasheets:
  root_dir: "datasheets"  # Root directory for all datasheets
  max_size_mb: 20  # Maximum size for individual datasheet files
  allowed_formats:  # Allowed file formats for datasheets
    - "pdf"
    - "txt"
    - "html"
  structure:  # Directory structure mirrors the component categories
    - "passive"
    - "active"
    - "connectors"
    - "mechanical"
    - "power"
    - "misc"
  naming_convention: "{manufacturer}_{part_number}_{revision}.{format}"  # Example: TexasInstruments_TPS7A4700_RevA.pdf 