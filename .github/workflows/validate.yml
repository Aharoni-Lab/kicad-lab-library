name: Library Validation

on:
  pull_request:
    paths:
      - 'symbols/**'
      - 'footprints/**'
      - '3dmodels/**'
      - '*-lib-table'
      - 'scripts/**'
      - 'validator/**'
      - 'library_rules.yaml'
      - 'tests/**'
  push:
    branches: [main]
    paths:
      - 'symbols/**'
      - 'footprints/**'
      - '3dmodels/**'
      - '*-lib-table'
      - 'scripts/**'
      - 'validator/**'
      - 'library_rules.yaml'
      - 'tests/**'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytest pyyaml

      - name: Run tests
        run: pytest tests/ -v

  klc-check:
    name: KLC Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Detect changed library files
        id: changes
        uses: ./.github/actions/detect-changes

      - name: Clone kicad-library-utils
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git clone --depth 1 https://gitlab.com/kicad/libraries/kicad-library-utils.git /tmp/kicad-library-utils

      - name: Run KLC checks on symbols
        if: steps.changes.outputs.has_changes == 'true' && steps.changes.outputs.sym_files != ''
        run: |
          EXIT_CODE=0
          while IFS= read -r sym_file; do
            [ -z "$sym_file" ] && continue
            echo "::group::Checking $sym_file"
            python /tmp/kicad-library-utils/klc-check/check_symbol.py "$sym_file" 2>&1 | tee -a klc-report.txt || EXIT_CODE=1
            echo "::endgroup::"
          done <<< "${{ steps.changes.outputs.sym_files }}"
          exit $EXIT_CODE

      - name: Run KLC checks on footprints (errors)
        if: steps.changes.outputs.has_changes == 'true' && steps.changes.outputs.fp_files != ''
        run: |
          EXIT_CODE=0
          while IFS= read -r fp_file; do
            [ -z "$fp_file" ] && continue
            echo "::group::Checking $fp_file"
            python /tmp/kicad-library-utils/klc-check/check_footprint.py "$fp_file" -r F9.1 2>&1 | tee -a klc-report.txt || EXIT_CODE=1
            echo "::endgroup::"
          done <<< "${{ steps.changes.outputs.fp_files }}"
          exit $EXIT_CODE

      - name: Run KLC checks on footprints (warnings)
        if: steps.changes.outputs.has_changes == 'true' && steps.changes.outputs.fp_files != ''
        run: |
          while IFS= read -r fp_file; do
            [ -z "$fp_file" ] && continue
            echo "::group::Checking $fp_file"
            python /tmp/kicad-library-utils/klc-check/check_footprint.py "$fp_file" -e F9.1 2>&1 | tee -a klc-report.txt || echo "::warning::KLC warnings for $fp_file"
            echo "::endgroup::"
          done <<< "${{ steps.changes.outputs.fp_files }}"

      - name: Upload KLC report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: klc-report
          path: klc-report.txt
          if-no-files-found: ignore

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Run lab-specific validation
        run: python -m validator --all --check-tables --check-footprints --check-generated-tables

  render-and-report:
    name: Render & Report
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && always()
    needs: [test, klc-check]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Detect changed library files
        id: changes
        uses: ./.github/actions/detect-changes

      - name: Prepare render directories
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          mkdir -p renders
          chmod 777 renders

      - name: Render with KiCad CLI
        if: steps.changes.outputs.has_changes == 'true'
        uses: docker://kicad/kicad:10.0
        env:
          HOME: /tmp
        with:
          entrypoint: /bin/bash
          args: |
            -c "
            while IFS= read -r sym_file; do
              [ -z \"$sym_file\" ] && continue
              echo \"Rendering $sym_file\"
              kicad-cli sym export svg --output renders/ \"$sym_file\" || true
            done <<< '${{ steps.changes.outputs.sym_files }}'
            while IFS= read -r fp_file; do
              [ -z \"$fp_file\" ] && continue
              echo \"Rendering $fp_file\"
              FP_DIR=$(dirname \"$fp_file\")
              FP_NAME=$(basename \"$fp_file\" .kicad_mod)
              kicad-cli fp export svg --output renders/ --footprint \"$FP_NAME\" \"$FP_DIR\" || true
            done <<< '${{ steps.changes.outputs.fp_files }}'
            ls -la renders/ 2>/dev/null || echo 'No renders produced'
            "

      - name: Fix SVG sizing for browser display
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          for svg in renders/*.svg; do
            [ -f "$svg" ] || continue
            sed -i 's/width="[0-9.]*mm"/width="100%"/; s/height="[0-9.]*mm"/height="100%"/' "$svg"
          done

      - name: Generate HTML viewers for renders
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          for svg in renders/*.svg; do
            [ -f "$svg" ] || continue
            name=$(basename "$svg" .svg)
            cat > "renders/${name}.html" <<HTMLEOF
          <!DOCTYPE html>
          <html><head>
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>${name}</title>
            <style>
              body { margin: 0; background: #f5f5f5; display: flex;
                     justify-content: center; padding: 2rem; }
              .card { background: white; padding: 2rem;
                      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
                      width: 95%; max-width: 1200px; }
              .card svg { width: 100%; height: auto; display: block; }
            </style>
          </head><body>
            <div class="card" id="viewer"></div>
            <script>
              fetch('${name}.svg')
                .then(r => r.text())
                .then(svg => document.getElementById('viewer').innerHTML = svg);
            </script>
          </body></html>
          HTMLEOF
          done

      - name: Deploy renders to GitHub Pages
        if: steps.changes.outputs.has_changes == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./renders
          destination_dir: renders/pr-${{ github.event.pull_request.number }}
          keep_files: true

      - name: Upload rendered previews
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: rendered-previews
          path: renders/
          if-no-files-found: ignore

      - name: Download KLC report
        uses: actions/download-artifact@v4
        with:
          name: klc-report
          path: .
        continue-on-error: true

      - name: Install pyyaml for report
        run: pip install pyyaml

      - name: List rendered files
        id: renders
        run: |
          RENDER_URL="https://aharoni-lab.com/kicad-lab-library/renders/pr-${{ github.event.pull_request.number }}"
          echo "base_url=$RENDER_URL" >> $GITHUB_OUTPUT
          if [ -d renders ] && [ "$(ls renders/*.svg 2>/dev/null)" ]; then
            echo "has_renders=true" >> $GITHUB_OUTPUT
          else
            echo "has_renders=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate validation report
        run: |
          SYM_ARGS=""
          FP_ARGS=""
          RENDER_ARGS=""
          if [ -n "${{ steps.changes.outputs.sym_files }}" ]; then
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              SYM_ARGS="$SYM_ARGS $f"
            done <<< "${{ steps.changes.outputs.sym_files }}"
          fi
          if [ -n "${{ steps.changes.outputs.fp_files }}" ]; then
            FP_LIST=""
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              FP_LIST="$FP_LIST $f"
            done <<< "${{ steps.changes.outputs.fp_files }}"
            if [ -n "$FP_LIST" ]; then
              FP_ARGS="--footprint-files $FP_LIST"
            fi
          fi
          if [ "${{ steps.renders.outputs.has_renders }}" = "true" ]; then
            RENDER_ARGS="--renders-url ${{ steps.renders.outputs.base_url }} --renders-dir renders"
          fi
          python -m validator --report $SYM_ARGS $FP_ARGS $RENDER_ARGS > report.md
          cat report.md

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = '';
            try {
              report = fs.readFileSync('report.md', 'utf8');
            } catch (e) {
              report = '## Library Validation Report\n\nNo validation report generated.';
            }

            const testResult = '${{ needs.test.result }}';
            const klcResult = '${{ needs.klc-check.result }}';
            const allPassed = testResult === 'success' && klcResult === 'success';
            const statusIcon = allPassed ? ':white_check_mark:' : ':x:';
            const statusText = allPassed ? 'PASS' : 'FAIL';

            let body = `## Library Validation Report ${statusIcon}\n\n`;
            body += `**Overall Status: ${statusText}**\n\n`;
            body += `| Check | Result |\n|-------|--------|\n`;
            body += `| Tests | ${testResult === 'success' ? ':white_check_mark: Passed' : ':x: Failed'} |\n`;
            body += `| KLC Validation | ${klcResult === 'success' ? ':white_check_mark: Passed' : ':x: Failed'} |\n\n`;

            // Include KLC details if available
            let klcDetails = '';
            try {
              klcDetails = fs.readFileSync('klc-report.txt', 'utf8').trim();
            } catch (e) {}
            if (klcDetails) {
              body += `<details>\n<summary>KLC Validation Details</summary>\n\n\`\`\`\n${klcDetails}\n\`\`\`\n\n</details>\n\n`;
            }

            body += report;
            body += `\n\n---\n*Generated by CI — [view workflow run](../actions/runs/${context.runId})*`;

            // Find existing bot comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Library Validation Report')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
