name: Validate Libraries

on:
  push:
    branches:
      - main
    paths:
      - 'scripts/**'
      - 'config/**'
      - 'symbols/**'
      - 'footprints/**'
      - '3dmodels/**'
      - 'datasheets/**'
      - '.github/workflows/validate.yml'
  pull_request:
    paths:
      - 'scripts/**'
      - 'config/**'
      - 'symbols/**'
      - 'footprints/**'
      - '3dmodels/**'
      - 'datasheets/**'
      - '.github/workflows/validate.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for comparing changes

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest tests/ -v

  validate:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for comparing changes

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install KiCad
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository --yes ppa:kicad/kicad-7.0-releases
          sudo apt-get update
          # Install KiCad components individually
          sudo apt-get install -y \
            kicad-symbols \
            kicad-footprints \
            kicad-packages3d \
            kicad-templates \
            kicad-cli

      - name: Verify KiCad CLI
        run: |
          kicad-cli --version
          kicad-cli pcb --version
          kicad-cli sch --version

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Get changed files
        id: changed-files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # For pull requests, compare with the base branch
            git fetch origin ${{ github.base_ref }}
            CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }} HEAD)
          else
            # For pushes to main, compare with the previous commit
            CHANGED_FILES=$(git diff --name-only HEAD^ HEAD)
          fi
          
          # Filter for relevant paths and write to file
          echo "$CHANGED_FILES" | grep -E '^(symbols|footprints|3dmodels|datasheets|scripts|\.github/workflows)/' > changed_files.txt
          
          # Set output for next steps
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          cat changed_files.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run validation
        if: steps.changed-files.outputs.changed_files != ''
        run: |
          # Set LAB_ROOT environment variable
          export LAB_ROOT=${{ github.workspace }}
          
          # Run validation script with changed files
          python scripts/validate_libraries.py --changed-files changed_files.txt

      - name: Check validation results
        if: steps.changed-files.outputs.changed_files != ''
        run: |
          if [ -f validation_results.json ]; then
            # Check if there are any errors
            if jq -e '.errors | length > 0' validation_results.json; then
              echo "Validation errors found:"
              jq '.errors[]' validation_results.json
              exit 1
            fi
          fi

  pr_checks:
    if: github.event_name == 'pull_request'
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check PR template
        run: |
          if [ -f .github/PULL_REQUEST_TEMPLATE.md ]; then
            if ! grep -q "Component Information" "$GITHUB_EVENT_PATH"; then
              echo "❌ PR description does not follow the template"
              echo "Please use the PR template when creating pull requests"
              exit 1
            fi
          fi
      - name: Check file structure
        run: |
          # Check if files are in correct directories
          for file in $(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }}); do
            if [[ $file == symbols/* ]] || [[ $file == footprints/* ]] || [[ $file == 3dmodels/* ]]; then
              # Extract category from file path
              category=$(echo $file | cut -d'/' -f2)
              if ! grep -q "$category:" config/library_structure.yml; then
                echo "❌ File $file is in an invalid category: $category"
                echo "Please check config/library_structure.yml for valid categories"
                exit 1
              fi
            fi
          done 