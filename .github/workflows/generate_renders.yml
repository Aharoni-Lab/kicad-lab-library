name: Generate Renders

on:
  pull_request:
    paths:
      - 'symbols/**/*.kicad_sym'
      - 'footprints/**/*.kicad_mod'
      - '3dmodels/**/*.wrl'
      - '3dmodels/**/*.step'

jobs:
  generate-renders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Fetch all history for comparing changes
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install KiCad
        run: |
          sudo apt-get update
          sudo apt-get install -y kicad
      
      - name: Get modified files
        id: modified-files
        run: |
          # Get list of modified files
          git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} > modified_files.txt
          # Set environment variable with modified files
          echo "MODIFIED_FILES<<EOF" >> $GITHUB_ENV
          cat modified_files.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
      
      - name: Generate renders
        run: |
          python scripts/generate_renders.py
      
      - name: Upload renders
        uses: actions/upload-artifact@v4
        with:
          name: renders
          path: renders/
          if-no-files-found: error
      
      - name: Comment on PR
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Get list of generated renders
            const rendersDir = 'renders';
            const renders = fs.readdirSync(rendersDir)
              .filter(file => file.endsWith('.png'))
              .sort();
            
            if (renders.length === 0) {
              return;
            }
            
            // Group renders by component
            const componentRenders = {};
            renders.forEach(render => {
              const [componentName] = render.split('_');
              if (!componentRenders[componentName]) {
                componentRenders[componentName] = [];
              }
              componentRenders[componentName].push(render);
            });
            
            // Create comment with renders
            let comment = '## Component Renders\n\n';
            
            for (const [componentName, componentFiles] of Object.entries(componentRenders)) {
              comment += `### ${componentName}\n\n`;
              
              // Group renders by type (symbol, footprint, 3D)
              const symbolRenders = componentFiles.filter(f => f.includes('_symbol'));
              const footprintRenders = componentFiles.filter(f => f.includes('_top') || f.includes('_bottom') || f.includes('_all'));
              const modelRenders = componentFiles.filter(f => f.includes('_3d'));
              
              if (symbolRenders.length > 0) {
                comment += '#### Symbol Views\n\n';
                for (const render of symbolRenders) {
                  const viewName = render.includes('_bw') ? 'Black & White' :
                                 render.includes('_large') ? 'Large View' : 'Default View';
                  comment += `**${viewName}**\n\n`;
                  comment += `![${render}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}/artifacts/${context.runId}/${render})\n\n`;
                }
              }
              
              if (footprintRenders.length > 0) {
                comment += '#### Footprint Views\n\n';
                for (const render of footprintRenders) {
                  const viewName = render.includes('_top') ? 'Top Layer' :
                                 render.includes('_bottom') ? 'Bottom Layer' :
                                 render.includes('_all') ? 'All Layers' : 'Large View';
                  comment += `**${viewName}**\n\n`;
                  comment += `![${render}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}/artifacts/${context.runId}/${render})\n\n`;
                }
              }
              
              if (modelRenders.length > 0) {
                comment += '#### 3D Model Views\n\n';
                for (const render of modelRenders) {
                  const viewName = render.includes('_front') ? 'Front View' :
                                 render.includes('_top') ? 'Top View' :
                                 render.includes('_iso') ? 'Isometric View' : 'Large View';
                  comment += `**${viewName}**\n\n`;
                  comment += `![${render}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}/artifacts/${context.runId}/${render})\n\n`;
                }
              }
              
              comment += '---\n\n';
            }
            
            // Add comment to PR
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            }); 