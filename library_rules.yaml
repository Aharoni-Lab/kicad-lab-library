version: "1.0"

library:
  prefix: "AharoniLab_"
  env_var: "AHARONI_LAB_KICAD_LIB"

# Global required properties for ALL symbols
global_symbol_properties:
  Reference:
    required: true
  Value:
    required: true
  Footprint:
    required: false       # Can be empty for generic symbols
  Datasheet:
    required: false
    pattern: "^https?://.+"
  Description:
    required: true
  ki_keywords:
    required: true
  Validated:
    required: true
    pattern: "^(Yes|No)$"
  Manufacturer:
    required: false
  MPN:
    required: false
    pattern: "^(?!N/?A$|TBD$|TODO$).+"

# Per-library-file rules (keyed by filename stem)
# Additive to global_symbol_properties
categories:
  AharoniLab_Passive:
    description: "Passive components (resistors, capacitors, inductors, diodes)"
    subcategories:
      resistor:  { reference_prefix: "R", pins: { min: 2, max: 2 } }
      capacitor: { reference_prefix: "C", pins: { min: 2, max: 2 } }
      inductor:  { reference_prefix: "L", pins: { min: 2, max: 2 } }
      diode:     { reference_prefix: "D", pins: { min: 2, max: 3 } }
  AharoniLab_Connector:
    description: "Connectors and headers"
    reference_prefix: "J"
    pins: { min: 2 }
  AharoniLab_MCU:
    description: "Microcontrollers"
    reference_prefix: "U"
    pins: { min: 8 }
  AharoniLab_Power:
    description: "Power management ICs"
    reference_prefix: "U"
    pins: { min: 3 }
  AharoniLab_Sensor:
    description: "Sensors and transducers (including image sensors)"
    reference_prefix: "U"
    pins: { min: 3 }
  AharoniLab_OpAmp:
    description: "Operational amplifiers and comparators"
    reference_prefix: "U"
    pins: { min: 3 }
  AharoniLab_Transistor:
    description: "Discrete transistors and MOSFETs"
    reference_prefix: "Q"
    pins: { min: 3 }
  AharoniLab_Logic:
    description: "Logic ICs (gates, buffers, flip-flops)"
    reference_prefix: "U"
    pins: { min: 3 }
  AharoniLab_Memory:
    description: "Memory ICs (EEPROM, Flash, SRAM)"
    reference_prefix: "U"
    pins: { min: 4 }
  AharoniLab_Interface:
    description: "Interface ICs (SERDES, level shifters, transceivers)"
    reference_prefix: "U"
    pins: { min: 3 }

# Footprint validation
footprint_required_layers:
  - "F.Cu"
  - "F.CrtYd"
  - "F.Fab"

global_footprint_properties:
  Reference:
    required: true
  Value:
    required: true
  Validated:
    required: true
    pattern: "^(Yes|No)$"

footprint_layer_rules:
  common: ["F.CrtYd", "F.Fab"]
  smd: ["F.Cu"]
  through_hole: ["F.Cu", "B.Cu"]

# Symbol flag defaults
symbol_flags:
  in_bom: true
  on_board: true

# Naming conventions
naming:
  symbol_file_pattern: "^AharoniLab_[A-Za-z0-9_]+\\.kicad_sym$"
  footprint_dir_pattern: "^AharoniLab_[A-Za-z0-9_]+\\.pretty$"
